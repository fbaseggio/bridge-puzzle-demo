<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sure-tricks Demo</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: #f5f7fb;
        color: #18212f;
        font-family: Georgia, "Times New Roman", serif;
        line-height: 1.58;
      }
      .site-header {
        border-bottom: 1px solid #e2e8f0;
        background: #f8fafc;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .site-header-inner {
        max-width: 1180px;
        margin: 0 auto;
        padding: 12px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }
      .site-title {
        text-decoration: none;
        color: #0f172a;
        font-weight: 700;
        font-size: 1rem;
      }
      .site-nav {
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .site-nav a {
        text-decoration: none;
        color: #334155;
        font-size: 0.95rem;
      }
      .site-nav a.active {
        color: #0f172a;
        font-weight: 600;
      }
      .site-nav a:hover,
      .site-nav a:focus-visible {
        color: #0f172a;
      }
      @media (max-width: 640px) {
        .site-header-inner {
          padding: 10px 14px;
          flex-wrap: wrap;
          gap: 8px 12px;
          align-items: flex-start;
        }
        .site-title {
          font-size: 0.95rem;
        }
        .site-nav {
          width: 100%;
          gap: 12px;
        }
        .site-nav a {
          font-size: 0.9rem;
        }
      }
      .article {
        max-width: 780px;
        margin: 0 auto;
        padding: 28px 18px 40px;
      }
      .crumbs {
        margin: 0 0 12px;
        font-size: 0.92rem;
        color: #64748b;
      }
      .crumbs a {
        color: #64748b;
        text-decoration: none;
      }
      .crumbs a:hover,
      .crumbs a:focus-visible {
        color: #334155;
        text-decoration: underline;
      }
      h1 {
        margin: 0 0 16px;
        font-size: clamp(1.5rem, 2.8vw, 2rem);
        line-height: 1.2;
        font-weight: 700;
        color: #101827;
      }
      p {
        margin: 0 0 14px;
        font-size: 1.03rem;
      }
      figure.widget {
        margin: 12px 0 14px;
      }
      figure.widget iframe {
        display: block;
        width: 100%;
        max-width: 470px;
        height: 364px;
        border: none;
        background: transparent;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="site-title" href="/">DeepSqueeze</a>
        <nav class="site-nav" aria-label="Site">
          <a href="/workbench/">Workbench</a>
          <a href="/practice/">Practice</a>
          <a class="active" href="/articles/">Articles</a>
        </nav>
      </div>
    </header>
    <main class="article">
      <p class="crumbs"><a href="/">Home</a> / <a href="/articles/">Articles</a> / Sure-tricks Demo</p>
      <h1>Sure-tricks Demo</h1>
      <p>
        This BridgeMaster-style problem illustrates a common issue in positional squeezes. Marked cards are shown in
        the diagram, with remaining cards that might be in either hand listed to the lower-left.
      </p>
      <figure class="widget">
        <iframe
          src="/workbench/?mode=widget&amp;problem=sure_tricks_demo"
          aria-label="Sure-tricks Demo Version Unknown"
          loading="lazy"
          referrerpolicy="same-origin"
        ></iframe>
      </figure>
    </main>
  </body>
</html>
