<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Articles</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      .site-header {
        border-bottom: 1px solid #e2e8f0;
        background: #f8fafc;
      }

      .site-header-inner {
        max-width: 1040px;
        margin: 0 auto;
        padding: 12px 18px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .site-title {
        text-decoration: none;
        color: #0f172a;
        font-weight: 700;
        font-size: 1rem;
      }

      .site-nav {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .site-nav a {
        text-decoration: none;
        color: #334155;
        font-size: 0.95rem;
      }

      .site-nav a.active {
        color: #0f172a;
        font-weight: 600;
      }

      .site-nav a:hover,
      .site-nav a:focus-visible {
        color: #0f172a;
      }

      .page {
        min-height: calc(100vh - 49px);
        display: grid;
        place-items: center;
        padding: 32px 20px;
      }

      main {
        width: 100%;
        max-width: 700px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4.8vw, 2.8rem);
        line-height: 1.1;
      }

      p {
        margin: 0 0 22px;
        color: #334155;
        font-size: 1rem;
      }

      nav {
        display: grid;
        gap: 12px;
      }

      a {
        display: block;
        text-decoration: none;
        color: #0f172a;
        background: #ffffff;
        border: 1px solid #dbe4ee;
        border-radius: 12px;
        padding: 14px 16px;
        font-weight: 600;
      }

      a:hover,
      a:focus-visible {
        border-color: #94a3b8;
        background: #f1f5f9;
      }
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="site-header-inner">
        <a class="site-title" href="/">DeepSqueeze</a>
        <nav class="site-nav" aria-label="Site">
          <a href="/workbench/">Workbench</a>
          <a href="/practice/">Practice</a>
          <a class="active" href="/articles/">Articles</a>
        </nav>
      </div>
    </header>
    <div class="page">
      <main>
        <h1>Articles</h1>
        <p>Long-form writeups and interactive walkthroughs for endgame bridge positions.</p>
        <nav aria-label="Article list">
          <a href="/articles/squeeze-self/">Squeeze Self</a>
          <a href="/articles/coffin-examples/">Coffin Examples</a>
        </nav>
      </main>
    </div>
  </body>
</html>
