<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Articles</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      main {
        width: 100%;
        max-width: 700px;
      }

      h1 {
        margin: 0 0 12px;
        font-size: clamp(2rem, 4.8vw, 2.8rem);
        line-height: 1.1;
      }

      p {
        margin: 0 0 22px;
        color: #334155;
        font-size: 1rem;
      }

      nav {
        display: grid;
        gap: 12px;
      }

      a {
        display: block;
        text-decoration: none;
        color: #0f172a;
        background: #ffffff;
        border: 1px solid #dbe4ee;
        border-radius: 12px;
        padding: 14px 16px;
        font-weight: 600;
      }

      a:hover,
      a:focus-visible {
        border-color: #94a3b8;
        background: #f1f5f9;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Articles</h1>
      <p>Long-form writeups and interactive walkthroughs for endgame bridge positions.</p>
      <nav aria-label="Article list">
        <a href="/articles/squeeze-self/">Squeeze Self</a>
      </nav>
    </main>
  </body>
</html>
